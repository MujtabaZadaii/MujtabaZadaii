<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Section Header: Tech Stack</desc>

  <defs>
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <linearGradient id="header-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" />
    </pattern>
  </defs>

  <rect width="1200" height="120" rx="16" fill="url(#header-bg)" />
  <rect width="1200" height="120" rx="16" fill="url(#grid)" />
  <rect width="8" height="60" x="40" y="30" rx="4" fill="url(#header-accent)" />

  <text x="70" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="700" font-size="36" fill="#ffffff" letter-spacing="-0.5">
    Tech Stack<tspan fill="#0ea5e9">.</tspan>
  </text>
  
  <text x="310" y="70" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#737373">
    // Languages, Frameworks &amp; Tools
  </text>
</svg>
