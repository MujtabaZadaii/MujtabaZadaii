<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="title desc">
  <title id="title">Mujtaba Zadaii - Full Stack Developer</title>
  <desc id="desc">Full-Stack Developer specializing in MERN, Laravel, and ASP.NET.</desc>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Canvas -->
  <rect width="1200" height="420" rx="24" fill="url(#bg-gradient)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>

  <!-- Subtle glow accents in background -->
  <circle cx="200" cy="100" r="150" fill="#0ea5e9" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="200" fill="#8b5cf6" opacity="0.1" filter="url(#glow)" />

  <!-- Window Controls -->
  <g transform="translate(32, 28)">
    <circle cx="0" cy="0" r="6" fill="#ef4444" opacity="0.8" />
    <circle cx="20" cy="0" r="6" fill="#f59e0b" opacity="0.8" />
    <circle cx="40" cy="0" r="6" fill="#10b981" opacity="0.8" />
  </g>

  <!-- Code Editor Motif -->
  <g transform="translate(60, 110)">
    <!-- Path line -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#737373">
      ~/portfolio/mujtabazadaii <tspan fill="#38bdf8">on main</tspan>
    </text>
    
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="-2">
      Mujtaba Zadaii<tspan fill="#0ea5e9">.</tspan>
    </text>

    <text x="0" y="110" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-weight="600" font-size="32" fill="#a3a3a3" letter-spacing="-0.5">
      Full-Stack <tspan fill="#ffffff">Web Applications</tspan> &amp; <tspan fill="#a855f7">AI Solutions</tspan>
    </text>

    <text x="0" y="160" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#737373" max-width="600">
      MERN Stack / Laravel / PHP / ASP.NET MVC
    </text>
  </g>

  <!-- Right Side: Tech Stack Visual or Diagram -->
  <g transform="translate(760, 80)">
    <!-- Outer Box -->
    <rect x="0" y="0" width="380" height="260" rx="16" fill="#000000" fill-opacity="0.4" stroke="#ffffff" stroke-opacity="0.1" />
    
    <!-- Code block visualization -->
    <g transform="translate(30, 40)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a3a3a3">
      <text x="0" y="0"><tspan fill="#c678dd">const</tspan> developer <tspan fill="#38bdf8">=</tspan> {</text>
      <text x="20" y="30">name: <tspan fill="#98c379">'Mujtaba Hyder'</tspan>,</text>
      <text x="20" y="60">role: <tspan fill="#98c379">'Full Stack Engineer'</tspan>,</text>
      <text x="20" y="90">skills: [</text>
      <text x="40" y="120"><tspan fill="#98c379">'MERN Stack'</tspan>, <tspan fill="#98c379">'Laravel'</tspan>,</text>
      <text x="40" y="150"><tspan fill="#98c379">'PHP'</tspan>, <tspan fill="#98c379">'ASP.NET MVC'</tspan>,</text>
      <text x="40" y="180"><tspan fill="#98c379">'Node.js'</tspan>, <tspan fill="#98c379">'MongoDB'</tspan></text>
      <text x="20" y="210">]</text>
      <text x="0" y="240">};</text>
    </g>

    <!-- Highlight marker -->
    <rect x="20" y="70" width="340" height="26" fill="#ffffff" fill-opacity="0.05" rx="4" />
    <!-- Blinking cursor -->
    <rect x="180" y="228" width="8" height="16" fill="#0ea5e9">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
